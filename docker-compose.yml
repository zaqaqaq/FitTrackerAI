services:
  backend:
    build: ./backend
    container_name: fitracker-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/static:/app/static
      - ./backend/fitracker.db:/app/fitracker.db
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./fitracker.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: fitracker-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped